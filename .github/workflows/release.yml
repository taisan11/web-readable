name: Release npm package
on:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-26-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: rustup target list --installed
      - name: Set up Zig for musl builds
        if: endsWith(matrix.target, '-unknown-linux-musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build native addon
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *-unknown-linux-musl ]]; then
            bun x napi build --release --features napi --platform --target "${{ matrix.target }}" --cross-compile
          elif [[ "${{ matrix.target }}" == *-unknown-linux-* ]]; then
            bun x napi build --release --features napi --platform --target "${{ matrix.target }}" --use-napi-cross
          else
            bun x napi build --release --features napi --platform --target "${{ matrix.target }}"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: '*.node'
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bun x napi create-npm-dirs
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - run: bun x napi artifacts -d artifacts
      # Bootstrap only: NAPI-RS publishes the per-platform optional packages here.
      # Remove NPM_TOKEN after the first successful release and configure Trusted Publishing.
      - run: bun x napi prepublish -t npm
      - run: npm publish
